<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWGOH Gear Parser</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-deep: #050b1d;
            --bg-panel: rgba(12, 28, 56, 0.72);
            --line: rgba(148, 184, 255, 0.25);
            --text-main: #e6f2ff;
            --text-muted: #9fb7d9;
            --accent: #43b0ff;
            --accent-2: #6ce5ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 2rem;
            color: var(--text-main);
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            background:
                    radial-gradient(circle at 15% 15%, rgba(44, 122, 255, 0.22), transparent 32%),
                    radial-gradient(circle at 85% 0%, rgba(108, 229, 255, 0.16), transparent 40%),
                    linear-gradient(150deg, #020617 0%, #0a1d42 48%, #0b2f5c 100%);
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.6rem;
            border-radius: 18px;
            border: 1px solid var(--line);
            background:
                    linear-gradient(135deg, rgba(20, 45, 86, 0.78), rgba(8, 22, 47, 0.84)),
                    linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0));
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .title {
            margin: 0 0 .4rem;
            letter-spacing: .4px;
            text-shadow: 0 0 24px rgba(67, 176, 255, 0.35);
        }

        .subtitle {
            margin: 0 0 1rem;
            color: var(--text-muted);
        }

        button {
            color: #f7fbff;
            border: 1px solid rgba(155, 222, 255, 0.6);
            border-radius: 12px;
            padding: .66rem 1.05rem;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: .2px;
            background: linear-gradient(135deg, #0d7fdb 0%, #4bb8ff 100%);
            box-shadow: 0 10px 28px rgba(16, 104, 199, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            transition: transform .15s ease, box-shadow .15s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(16, 104, 199, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .meta {
            margin: .8rem 0 1rem;
            padding: .7rem .9rem;
            border-radius: 10px;
            color: var(--text-muted);
            background: rgba(16, 42, 88, 0.45);
            border: 1px solid rgba(143, 197, 255, 0.22);
            font-size: .92rem;
        }

        .chart-box,
        .table-box {
            border-radius: 14px;
            border: 1px solid rgba(143, 197, 255, 0.2);
            background: linear-gradient(180deg, rgba(8, 26, 56, 0.66), rgba(4, 16, 38, 0.78));
            padding: .9rem;
            margin-top: .9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: .72rem .6rem;
            border-bottom: 1px solid rgba(121, 175, 255, 0.16);
            text-align: left;
        }

        th {
            color: var(--accent-2);
            font-weight: 700;
            text-transform: uppercase;
            font-size: .76rem;
            letter-spacing: .7px;
        }

        tr:hover td {
            background: rgba(67, 176, 255, 0.08);
        }
    </style>
</head>
<body>
<div class="shell">
    <h1 class="title">Dashboard de parsing SWGOH</h1>
    <p class="subtitle">Extraction intelligente des items par gear + catégorisation couleur.</p>
    <button id="reloadButton">Reload</button>
    <p class="meta" id="meta"></p>
    <div class="chart-box">
        <canvas id="gearChart" height="110"></canvas>
    </div>
    <div class="table-box">
        <table>
            <thead>
            <tr>
                <th>Gear</th>
                <th>Total items</th>
                <th>Bleus</th>
                <th>Orange</th>
                <th>Autres</th>
            </tr>
            </thead>
            <tbody id="statsBody"></tbody>
        </table>
    </div>
</div>

<script>
    let chart;

    async function loadStats(reload = false) {
        const endpoint = reload ? '/api/stats/reload' : '/api/stats';
        const method = reload ? 'POST' : 'GET';
        const response = await fetch(endpoint, {method});
        const data = await response.json();

        document.getElementById('meta').innerText =
            `Source: ${data.sourceUrl} | Refresh: ${new Date(data.refreshedAt).toLocaleString()} | Stratégie: ${data.parserStrategy}`;

        const body = document.getElementById('statsBody');
        body.innerHTML = '';

        data.gears.forEach(gear => {
            const blue = gear.colorCounts['bleu'] || 0;
            const orange = gear.colorCounts['orange'] || 0;
            const others = gear.totalItems - blue - orange;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${gear.gearLabel}</td><td>${gear.totalItems}</td><td>${blue}</td><td>${orange}</td><td>${others}</td>`;
            body.appendChild(tr);
        });

        renderChart(data.gears);
    }

    function renderChart(gears) {
        const labels = gears.map(g => g.gearLabel);
        const totals = gears.map(g => g.totalItems);
        const blues = gears.map(g => g.colorCounts['bleu'] || 0);
        const oranges = gears.map(g => g.colorCounts['orange'] || 0);

        if (chart) chart.destroy();

        chart = new Chart(document.getElementById('gearChart'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    {label: 'Total', data: totals, backgroundColor: 'rgba(148,163,184,0.7)'},
                    {label: 'Bleu', data: blues, backgroundColor: 'rgba(73,168,255,0.85)'},
                    {label: 'Orange', data: oranges, backgroundColor: 'rgba(249,115,22,0.86)'}
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: '#dbeafe'
                        }
                    }
                },
                scales: {
                    y: {
                        ticks: {color: '#b8d6ff'},
                        grid: {color: 'rgba(184, 214, 255, 0.18)'}
                    },
                    x: {
                        ticks: {color: '#b8d6ff'},
                        grid: {color: 'rgba(184, 214, 255, 0.08)'}
                    }
                }
            }
        });
    }

    document.getElementById('reloadButton').addEventListener('click', () => loadStats(true));
    loadStats();
</script>
</body>
</html>
