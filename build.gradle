plugins {
    id 'java'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    // no remote repositories: build runs fully offline in this environment
}

dependencies {
    testImplementation files(
            '/root/.local/share/mise/installs/gradle/8.14.3/gradle-8.14.3/lib/junit-4.13.2.jar',
            '/root/.local/share/mise/installs/gradle/8.14.3/gradle-8.14.3/lib/hamcrest-core-1.3.jar'
    )
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
            include 'com/example/gearparser/model/**'
            include 'com/example/gearparser/service/GearParsingEngine.java'
        }
    }
    test {
        java {
            srcDirs = ['src/test/java']
            include 'com/example/gearparser/service/GearParsingEngineTest.java'
        }
    }
}

tasks.withType(Test).configureEach {
    useJUnit()
}
